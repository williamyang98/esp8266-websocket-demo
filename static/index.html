<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="stylesheet" href="/css/index.css">
    <title>Websocket Demo</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div class="container mx-auto">
      <div class="d-flex flex-row w-100">
        <div class="flex-1" style="margin-right: 1px">
          <input class="w-100" type="text" id="ws_url_textedit"/>
        </div>
        <button id="ws_button">Connect</button>
      </div>
      <hr>
      <div>
        <button id="pc_power_on" class="inactive">POWER</button>
      </div>
    </div>
    <script type="module">
      import { App } from "./js/App.js";
      import { bind_app } from "./js/common.js";
      let app = new App();
      bind_app(app);
      window.app = app;
    </script>
  </body>
</html>
